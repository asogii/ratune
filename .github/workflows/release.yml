name: Release

# Push a tag like v0.1.0: create the GitHub Release, then build & upload per-platform archives.
# Uses https://github.com/taiki-e/upload-rust-binary-action (Marketplace: build-and-upload-rust-binary-to-github-releases).
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      # Omit `changelog:` — release body is empty unless you add CHANGELOG.md later.
      - uses: taiki-e/create-gh-release-action@v1

  upload-assets:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          # Apple Silicon (native) and Intel (cross from ARM runner); Homebrew uses one URL per arch.
          - os: macos-latest
            target: aarch64-apple-darwin
          # Intel: cross-built from ARM runner; if linking fails, use os: macos-13 instead.
          - os: macos-latest
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libdbus-1-dev pkg-config

      # Default name would be `$bin-$target` (e.g. ratune-x86_64-unknown-linux-gnu). `$tag` adds the
      # release version so archives are unambiguous when cached or mirrored (AUR, etc.).
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: ratune
          package: ratune
          target: ${{ matrix.target }}
          archive: $bin-$tag-$target
          locked: true
          checksum: sha256
